version: '3.9'
services:
  api:
    build: ./api
    ports: ["8000:80"]
    environment:
      - MODEL_REPO=flax-community/t5-recipe-generation
      - ANTHROPIC_API_KEY=your-key-here

  ui:
    build: ./ui
    ports: ["3000:3000"]
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    depends_on: [api]
